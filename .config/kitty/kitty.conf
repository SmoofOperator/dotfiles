# ── Font ──────────────────────────────────────────────────────────────────────
font_family      JetBrainsMono Nerd Font
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size        13.0

# ── Cursor ────────────────────────────────────────────────────────────────────
cursor_shape     block
cursor_blink_interval 0

# ── Scrollback ────────────────────────────────────────────────────────────────
scrollback_lines 10000

# ── Window ────────────────────────────────────────────────────────────────────
window_padding_width 8
hide_window_decorations no
remember_window_size  yes

# ── Tabs ──────────────────────────────────────────────────────────────────────
tab_bar_style powerline
tab_powerline_style slanted
map ctrl+shift+t new_tab
map ctrl+shift+right next_tab
map ctrl+shift+left previous_tab
map ctrl+shift+q close_tab

# ── Key bindings ──────────────────────────────────────────────────────────────
map ctrl+shift+n new_os_window

# ── Bell ──────────────────────────────────────────────────────────────────────
enable_audio_bell no

# ── Theme (Tokyo Night — matches LazyVim default) ─────────────────────────────
foreground              #c0caf5
background              #1a1b26
selection_foreground    #c0caf5
selection_background    #33467c
cursor                  #c0caf5
cursor_text_color       #1a1b26

color0  #15161e
color1  #f7768e
color2  #9ece6a
color3  #e0af68
color4  #7aa2f7
color5  #bb9af7
color6  #7dcfff
color7  #a9b1d6
color8  #414868
color9  #f7768e
color10 #9ece6a
color11 #e0af68
color12 #7aa2f7
color13 #bb9af7
color14 #7dcfff
color15 #c0caf5

# ── URL handling ──────────────────────────────────────────────────────────────
url_color #7aa2f7
url_style curly
open_url_with default
detect_urls yes

# ── Shell ─────────────────────────────────────────────────────────────────────
shell /usr/bin/zsh
