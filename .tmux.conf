# ── General ───────────────────────────────────────────────────────────────────
set -g default-terminal "screen-256color"  # 256 color support
set -g history-limit 10000                 # more scrollback
set -g mouse on                            # mouse support
set -sg escape-time 0                      # no delay after Escape (important for nvim)
set -g base-index 1                        # start window numbering at 1
setw -g pane-base-index 1                  # start pane numbering at 1
set -g renumber-windows on                 # renumber windows when one is closed

# ── Prefix ────────────────────────────────────────────────────────────────────
# Change prefix from Ctrl+b to Ctrl+a (easier to reach)
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# ── Key bindings ──────────────────────────────────────────────────────────────
# Reload config
bind r source-file ~/.tmux.conf \; display "Config reloaded"

# Split panes with | and -
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# Navigate panes with Alt+arrow (no prefix needed)
bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D

# Navigate windows with Shift+arrow
bind -n S-Left previous-window
bind -n S-Right next-window

# ── Status bar ────────────────────────────────────────────────────────────────
set -g status-style bg=colour235,fg=colour136
set -g status-left "#[fg=colour166,bold] #S "
set -g status-right "#[fg=colour136] %H:%M %d-%b "
set -g status-left-length 20
setw -g window-status-current-style fg=colour166,bold
setw -g window-status-current-format " #I:#W "
setw -g window-status-format " #I:#W "
